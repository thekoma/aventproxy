name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check aventproxy/proxy tests

      - name: Test
        run: pytest -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILD_FROM=python:3.12-alpine \
            -t aventproxy:test \
            aventproxy/

      - name: Smoke test
        run: |
          docker run --rm -d --name aventproxy-test \
            -v ${{ github.workspace }}/tests/fixtures/options.json:/data/options.json:ro \
            -p 18554:8554 \
            aventproxy:test
          sleep 2
          docker logs aventproxy-test
          docker stop aventproxy-test
