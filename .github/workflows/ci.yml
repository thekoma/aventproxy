name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pycryptodome aiohttp voluptuous

      - name: Lint
        run: |
          pip install ruff
          ruff check custom_components/ examples/ tools/ --ignore E501

      - name: Test
        run: PYTHONPATH=. pytest -v --tb=short tests/test_philips_avent/

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build bridge
        working-directory: avent-webrtc-bridge
        run: go build -o avent-webrtc-bridge .

      - name: Verify binary
        working-directory: avent-webrtc-bridge
        run: ./avent-webrtc-bridge --help

  docker-addon:
    runs-on: ubuntu-latest
    needs: [test-python, test-go]
    steps:
      - uses: actions/checkout@v6

      - name: Copy bridge source for Docker build
        run: cp -r avent-webrtc-bridge aventproxy-bridge-addon/avent-webrtc-bridge

      - name: Build add-on Docker image
        run: |
          docker build \
            --build-arg BUILD_FROM=debian:bookworm-slim \
            -t aventproxy-bridge:test \
            aventproxy-bridge-addon/

      - name: Verify binary in container
        run: |
          docker run --rm aventproxy-bridge:test avent-webrtc-bridge --help
