name: Release

on:
  workflow_dispatch:
    inputs:
      type:
        description: "Release type"
        type: choice
        options:
          - release
          - rc
          - beta
        default: release
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*-*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/thekoma/aventproxy-bridge

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            YEAR_MONTH="$(date +%Y).$(date +%-m)"
            TYPE="${{ inputs.type }}"

            LATEST=$(git tag -l "${YEAR_MONTH}.*" --sort=-v:refname | grep -vE '\-' | head -1)
            if [ -z "$LATEST" ]; then
              NEXT_INC=0
            else
              CURRENT_INC=$(echo "$LATEST" | awk -F. '{print $3}')
              NEXT_INC=$((CURRENT_INC + 1))
            fi
            BASE="${YEAR_MONTH}.${NEXT_INC}"

            if [ "$TYPE" = "release" ]; then
              VERSION="$BASE"
              PRERELEASE=false
            else
              LATEST_PRE=$(git tag -l "${BASE}-${TYPE}.*" --sort=-v:refname | head -1)
              if [ -z "$LATEST_PRE" ]; then
                PRE_NUM=1
              else
                CURRENT_PRE=$(echo "$LATEST_PRE" | grep -oE '[0-9]+$')
                PRE_NUM=$((CURRENT_PRE + 1))
              fi
              VERSION="${BASE}-${TYPE}.${PRE_NUM}"
              PRERELEASE=true
            fi

            # Update version in add-on config and HA manifest
            sed -i "s/^version:.*/version: \"${VERSION}\"/" aventproxy-bridge-addon/config.yaml
            sed -i "s/\"version\":.*/\"version\": \"${VERSION}\"/" custom_components/philips_avent/manifest.json

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add aventproxy-bridge-addon/config.yaml custom_components/philips_avent/manifest.json
            git commit -m "Release ${VERSION}" || true
            git tag "${VERSION}"
            git push origin main --tags

            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          else
            VERSION="${GITHUB_REF_NAME}"
            if echo "$VERSION" | grep -qE '\-(rc|beta|alpha)\.'; then
              PRERELEASE=true
            else
              PRERELEASE=false
            fi
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          fi

          echo "### Release" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pre-release:** ${PRERELEASE}" >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: version
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.version }}

      - name: Copy bridge source for Docker build
        run: cp -r tuya-ipc-terminal aventproxy-bridge-addon/tuya-ipc-terminal

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: aventproxy-bridge-addon
          push: true
          platforms: ${{ matrix.platform }}
          build-args: BUILD_FROM=debian:bookworm-slim
          tags: ${{ env.IMAGE }}:${{ needs.version.outputs.version }}-${{ matrix.suffix }}

  manifest:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Create multi-arch manifest
        run: |
          VERSION="${{ needs.version.outputs.version }}"

          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:${VERSION} \
            ${{ env.IMAGE }}:${VERSION}-amd64 \
            ${{ env.IMAGE }}:${VERSION}-arm64

          if [ "${{ needs.version.outputs.prerelease }}" = "false" ]; then
            docker buildx imagetools create \
              -t ${{ env.IMAGE }}:latest \
              ${{ env.IMAGE }}:${VERSION}-amd64 \
              ${{ env.IMAGE }}:${VERSION}-arm64
          fi

  release:
    needs: [version, manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          prerelease: ${{ needs.version.outputs.prerelease }}
          generate_release_notes: true
