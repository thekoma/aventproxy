name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/thekoma/aventproxy

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Update version in source
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sed -i "s/^version:.*/version: \"${VERSION}\"/" aventproxy/config.yaml
          sed -i "s/^__version__.*/__version__ = \"${VERSION}\"/" aventproxy/proxy/__init__.py

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: aventproxy
          push: true
          platforms: ${{ matrix.platform }}
          build-args: BUILD_FROM=python:3.12-alpine
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}-${{ matrix.suffix }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${GITHUB_REF_NAME}"
          docker manifest create ${{ env.IMAGE }}:${VERSION} \
            ${{ env.IMAGE }}:${VERSION}-amd64 \
            ${{ env.IMAGE }}:${VERSION}-arm64
          docker manifest push ${{ env.IMAGE }}:${VERSION}

          docker manifest create ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:${VERSION}-amd64 \
            ${{ env.IMAGE }}:${VERSION}-arm64
          docker manifest push ${{ env.IMAGE }}:latest

  release:
    needs: manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
