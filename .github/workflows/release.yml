name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Update add-on version
        run: |
          sed -i "s/^version:.*/version: \"${{ steps.version.outputs.version }}\"/" aventproxy/config.yaml
          sed -i "s/^__version__.*/__version__ = \"${{ steps.version.outputs.version }}\"/" aventproxy/proxy/__init__.py

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: aventproxy
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: BUILD_FROM=python:3.12-alpine
          tags: |
            ghcr.io/thekoma/aventproxy:${{ steps.version.outputs.version }}
            ghcr.io/thekoma/aventproxy:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
