name: "Avent RTSP Proxy"
description: "RTSP proxy for Philips Avent / Tuya-based cameras that reject OPTIONS requests"
version: "2026.4.0"
slug: "aventproxy"
url: "https://github.com/thekoma/aventproxy"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ports:
  "8554/tcp": 8654
ports_description:
  "8554/tcp": "RTSP proxy port (remappable from HA UI)"
options:
  cameras:
    - name: "baby_monitor"
      host: "192.168.1.100"
      port: 554
  bind_address: "0.0.0.0"
  log_level: "info"
schema:
  cameras:
    - name: "str"
      host: "str"
      port: "port?"
  bind_address: "str?"
  log_level: "list(debug|info|warning|error)?"
