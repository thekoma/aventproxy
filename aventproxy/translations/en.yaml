configuration:
  cameras:
    name: Camera list
    description: >-
      List of Tuya-based cameras to proxy. Each camera needs a unique name,
      the IP address (host), and optionally the RTSP port (default 554).
  bind_address:
    name: Bind address
    description: >-
      Address to bind the proxy to. Use 0.0.0.0 to allow connections from
      other add-ons (e.g. Frigate). Default is 0.0.0.0 inside the container.
  log_level:
    name: Log level
    description: Logging verbosity (debug, info, warning, error).
